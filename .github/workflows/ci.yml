name: Rust CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build_and_test:
    name: Build and Test Contracts
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: wasm32v1-none
        components: rustfmt, clippy

    - name: Cache dependencies
      uses: Swatinem/rust-cache@v2

    - name: Check formatting
      run: cargo fmt --all -- --check

    - name: Run Clippy (Linter)
      run: cargo clippy --all-targets --all-features --target wasm32v1-none -- -D warnings

    - name: Build Contracts (WASM)
      run: cargo build --target wasm32v1-none --release

    - name: Run Tests
      run: cargo test --verbose

    - name: Run Tests with Coverage
      run: |
        cargo install cargo-tarpaulin
        cargo tarpaulin --out Xml --output-dir ./coverage

    - name: Upload Coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage/cobertura.xml
        fail_ci_if_error: false

    - name: Security Audit
      run: |
        cargo install cargo-audit
        cargo audit

    - name: Check for Outdated Dependencies
      run: |
        cargo install cargo-outdated
        cargo outdated --exit-code 1
      continue-on-error: true

  wasm_target_drift_check:
    name: Prevent wasm32-unknown-unknown Target Drift
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Check deployment scripts use wasm32v1-none
      run: |
        echo "Scanning scripts/ for legacy wasm32-unknown-unknown target references..."
        if grep -rn "wasm32-unknown-unknown" scripts/; then
          echo ""
          echo "❌ ERROR: One or more deployment scripts still reference the old"
          echo "   'wasm32-unknown-unknown' target. Soroban SDK 27+ requires"
          echo "   'wasm32v1-none'. Update all occurrences shown above."
          exit 1
        fi
        echo "✅ No legacy wasm target references found in scripts/."

